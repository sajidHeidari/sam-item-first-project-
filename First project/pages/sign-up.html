<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SamItem sign up</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="icon" href="../images/Untitled-5.png" />
    <link rel="stylesheet" href="../css/sign-up.css" />
  </head>
  <body>
    <div id="form-container">
      <h2 class="form-title">ثبت&zwnj;نام</h2>
      <form action="#">
        <label for="fullname">نام و نام خانوادگی</label>
        <input
          type="text"
          name="fullname"
          id="fullname"
          placeholder="احمد صوفی زاده"
          required
          class="box"
        />
        <label for="Email">آدرس ایمیل</label>
        <input
          type="email"
          name="email"
          id="Email"
          placeholder="yourmail.@example.com"
          required
          class="box"
        />
        <label for="password">رمز عبور</label>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="رمز قوی استفاده کنید"
          required
          class="box"
        />
        <label for="address">محل سکونت</label>
        <textarea
          name="address"
          id="address"
          rows="3"
          placeholder="تهران، خیابان تهران، کوچه تهران، ...."
          class="box"
        ></textarea>
        <label for="how-u-find-us">چگونه با ما آشنا شدید؟</label>
        <select name="how-u-find-us" id="how-u-find-us" required class="box">
          <option value="" selected disabled>انتخاب گزینه</option>
          <option value="int">اینترنت</option>
          <option value="instagram">اینستاگرام</option>
          <option value="telegram">تلگرام</option>
          <option value="friends">دوستان</option>
        </select>
        <label>جنسیت</label>
        <div class="radio-group">
          <label> <input type="radio" name="gender" value="male" />مرد</label>
          <label> <input type="radio" name="gender" value="female" />زن</label>
        </div>
        <button type="submit" class="register-button">ثبت&zwnj;نام/عضویت</button>
      </form>
    </div>
  </body>
</html>
